site_name: TimeSeriesEconPy
site_description: A time-series language for macroeconomics, ported from TimeSeriesEcon.jl.
site_url: https://Nic2020.github.io/TimeSeriesEconPy/
repo_url: https://github.com/Nic2020/TimeSeriesEconPy
repo_name: Nic2020/TimeSeriesEconPy
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - markdown-exec
  - mkdocstrings:
      handlers:
        python:
          inventories:
            - https://numpy.org/doc/stable/objects.inv
          options:
            docstring_style: numpy
            show_source: true
            show_root_heading: true
            heading_level: 2
            members_order: source
            separate_signature: true
            show_signature_annotations: true

validation:
  links:
    not_found: warn
    anchors: warn
    absolute_links: warn
    unrecognized_links: warn
  nav:
    omitted_files: warn

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Tutorials:
      - "1. TimeSeriesEcon": tutorials/1_timeseriesecon.md
  - Reference:
      - Frequencies: reference/frequencies.md
      - "MIT & MITRange": reference/mit.md
      - TSeries: reference/tseries.md
      - MVTSeries: reference/mvtseries.md
      - Workspace: reference/workspace.md
      - "Math (shift, diff, moving, undiff)": reference/math.md
      - "Statistics (mean, std, cor)": reference/stats.md
      - Indexing (lookup): reference/indexing.md
      - "Frequency conversion (fconvert)": reference/fconvert.md
      - Recursive (rec, rec_linear): reference/recursive.md
      - "Linear algebra (@ matrix multiply)": reference/linalg.md
      - "Misc helpers (overlay, compare, reindex)": reference/various.md
      - "X-13ARIMA-SEATS (x13)": reference/x13.md
      - Options: reference/options.md
      - Plotting: reference/plotting.md
      - "Interop (pandas, polars)": reference/interop.md
      - "JSON I/O": reference/io.md
      - "Mirror metadata": reference/mirror.md
  - Design notes:
      - Overview: design/decisions.md
      - Frequency model: design/frequency_model.md
      - TSeries protocols: design/tseries_protocols.md
      - Cython strategy: design/cython_strategy.md
      - JSON serialization: design/serialization.md
      - Migration from Julia: design/migration_from_julia.md
  - API index: api_index.md
  - FAQ: faq.md
