name: wheels

# Build + smoke-test platform wheels via cibuildwheel.
#
# The wheels ship two compiled artifact families:
#
# * The four M1.5 Cython kernels (rec_linear / lookup / stats_scalar /
#   fconvert_lower_aggregate). Built by hatch_build.py during the
#   cibuildwheel-internal `pip wheel` step.
# * The X-13ARIMA-SEATS binary (M2.6 onward) vendored at
#   src/tsecon/x13/_binary/{x13as, x13as.exe}. Built from Census Bureau
#   Fortran source by the per-platform "Build x13as" step BEFORE
#   cibuildwheel runs, so the binary is on disk when hatch's
#   wheel-artifacts glob picks it up. Version pinned in
#   src/tsecon/_mirror.py X13AS_VERSION; SHA-256 verified before unpack.
#
# Smoke test runs the four Cython-kernel test files against the
# wheel-installed package + invokes a minimal `tsecon.x13.run` to
# confirm the bundled X-13 binary is executable in the test venv.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
  # Reusable from release.yml on tag pushes — the wheel matrix is the single
  # source of truth for both PR-time smoke builds and release-time PyPI builds.
  workflow_call:

concurrency:
  group: wheels-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_wheels:
    name: wheel (${{ matrix.python }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: [cp311, cp312, cp313]
    steps:
      - uses: actions/checkout@v4

      # --------------------------------------------------------------
      # X-13ARIMA-SEATS binary build (M2.6).
      #
      # Linux runs the build inside the manylinux2014 container via
      # CIBW_BEFORE_ALL_LINUX (centos7 + gcc-gfortran via yum) — the binary
      # then links against the manylinux glibc floor (2.17), matching what
      # `pip install TimeSeriesEconPy` users on common distros need.
      #
      # macOS and Windows run the build on the GHA host runner directly
      # (cibuildwheel does not container-isolate non-Linux builds) — the
      # host gets gfortran from `fortran-lang/setup-fortran@v1` and we
      # run the same `make -f makefile.gf` recipe inline below.
      # --------------------------------------------------------------

      - name: Read X-13ARIMA-SEATS version from _mirror.py
        id: x13_meta
        shell: bash
        run: |
          set -euo pipefail
          # Load _mirror.py as a standalone module (it has zero non-stdlib
          # deps beyond `typing.Final`) and read the constants properly.
          # Going via importlib avoids importing the full `tsecon` package
          # (Cython extensions aren't built yet at this step) AND avoids
          # the regex-vs-Python-implicit-string-concat fragility a prior
          # version of this step hit on `X13AS_SOURCE_URL`, which is
          # split across two adjacent "..." literals.
          python - <<'PY' >>"$GITHUB_OUTPUT"
          import importlib.util, pathlib
          path = pathlib.Path("src/tsecon/_mirror.py").resolve()
          spec = importlib.util.spec_from_file_location("_mirror_meta", path)
          assert spec is not None and spec.loader is not None
          mod = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(mod)
          for name in ("X13AS_VERSION", "X13AS_SOURCE_URL", "X13AS_SOURCE_SHA256"):
              value = getattr(mod, name)
              print(f"{name.lower()}={value}")
          PY

      - name: Set up Fortran toolchain (macOS / Windows host)
        if: runner.os != 'Linux'
        uses: fortran-lang/setup-fortran@v1
        with:
          compiler: gcc

      - name: Build x13as on host (macOS / Windows)
        if: runner.os != 'Linux'
        shell: bash
        env:
          X13AS_SOURCE_URL: ${{ steps.x13_meta.outputs.x13as_source_url }}
          X13AS_SOURCE_SHA256: ${{ steps.x13_meta.outputs.x13as_source_sha256 }}
          X13AS_VERSION: ${{ steps.x13_meta.outputs.x13as_version }}
        run: |
          set -euo pipefail
          mkdir -p src/tsecon/x13/_binary
          workdir="$(mktemp -d)"
          cd "$workdir"
          curl -sL -o x13as_src.tar.gz "$X13AS_SOURCE_URL"
          # Cross-platform SHA-256 check: shasum on macOS, sha256sum on Linux/MSYS.
          actual="$( (sha256sum x13as_src.tar.gz 2>/dev/null || shasum -a 256 x13as_src.tar.gz) | awk '{print $1}')"
          if [ "$actual" != "$X13AS_SOURCE_SHA256" ]; then
            echo "SHA-256 mismatch: expected $X13AS_SOURCE_SHA256 got $actual" >&2
            exit 1
          fi
          tar xzf x13as_src.tar.gz
          # Tarball top-level dir keeps the leading "v" (e.g. v1-1-b62).
          src_dir="x13as_asciisrc-${X13AS_VERSION}"
          cd "$src_dir"
          # `-fallow-argument-mismatch` demotes modern-gfortran's argument-
          # count-mismatch error back to a warning; X-13 b62 has at least
          # one legacy 3-vs-4 arity site (adpdrg.f:407-409's CALL inpter
          # with a trailing `,T)` against inpter.f's 3-arg signature) that
          # older gfortran (pre-10, what Yggdrasil's BinaryBuilder ships,
          # and what R's bundled gfortran wrapper allows by default) was
          # lenient on. setup-fortran@v1 installs gfortran 13.x which is
          # strict by default; the flag restores the legacy behaviour.
          #
          # `-static` is hard-coded in makefile.gf's link recipe (line 293)
          # and works on MinGW + Windows but breaks on macOS (no static
          # libc on Darwin — ld returns 1 with no further detail) and on
          # manylinux2014 (yum's gcc-toolset doesn't ship libc.a / libm.a,
          # in line with manylinux's dynamic-link policy). The targeted
          # replacement `-static-libgfortran -static-libgcc` bakes the
          # Fortran + GCC runtimes into the binary (so the user does not
          # need libgfortran installed) while leaving libc dynamic — the
          # canonical manylinux-friendly shape for a non-Python-extension
          # binary. Yggdrasil applies a similar `-static`-strip in its
          # X/X13as/build_tarballs.jl recipe for the same reason.
          if [ "${RUNNER_OS}" = "macOS" ]; then
            sed -i.bak 's/-static /-static-libgfortran -static-libgcc /' makefile.gf
          fi
          make -f makefile.gf FFLAGS='-O2 -fallow-argument-mismatch'
          dest="${GITHUB_WORKSPACE}/src/tsecon/x13/_binary"
          if [ "${RUNNER_OS}" = "Windows" ]; then
            cp x13as_ascii.exe "$dest/x13as.exe"
          else
            cp x13as_ascii "$dest/x13as"
            chmod +x "$dest/x13as"
          fi
          ls -la "$dest"

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.1
        env:
          # One CPython per matrix cell; the `*` covers manylinux/musllinux/win/macos arch suffixes.
          CIBW_BUILD: "${{ matrix.python }}-*"
          # Skip non-shipping targets — musllinux/Alpine, 32-bit, exotic arches.
          # PyPy is auto-skipped because CIBW_BUILD restricts to cp*.
          CIBW_SKIP: "*-musllinux_* *_i686 *_ppc64le *_s390x *_armv7l"
          # Stick to the architectures the project's classifiers + dev hardware cover.
          # macOS arm64 only (macos-latest = macos-14 = Apple Silicon); x86_64 macOS
          # would require a separate runner and is not in the standard matrix.
          CIBW_ARCHS_LINUX: x86_64
          CIBW_ARCHS_WINDOWS: AMD64
          CIBW_ARCHS_MACOS: arm64
          CIBW_BUILD_VERBOSITY: 1
          # Linux build runs inside the manylinux2014 container; gfortran is
          # installed via yum + the same make recipe runs there. The binary
          # ends up at the mounted src/tsecon/x13/_binary path the host
          # sees, so the rest of the wheel-build pipeline is platform-uniform.
          CIBW_BEFORE_ALL_LINUX: |
            yum install -y gcc-gfortran make tar gzip
            mkdir -p /tmp/x13_build && cd /tmp/x13_build
            curl -sL -o x13as_src.tar.gz "${{ steps.x13_meta.outputs.x13as_source_url }}"
            echo "${{ steps.x13_meta.outputs.x13as_source_sha256 }}  x13as_src.tar.gz" | sha256sum -c -
            tar xzf x13as_src.tar.gz
            # Tarball top-level dir keeps the leading "v" (e.g. v1-1-b62).
            cd x13as_asciisrc-${{ steps.x13_meta.outputs.x13as_version }}
            # See the host step's comment on -fallow-argument-mismatch —
            # the manylinux2014 container ships gfortran 10+ via yum's
            # gcc-gfortran, which has the same strict-by-default behaviour
            # as setup-fortran@v1.
            #
            # Strip `-static` from makefile.gf — manylinux2014's
            # intentional dynamic-link policy does not ship static libc.a /
            # libm.a, so the makefile's hard-coded `gfortran -static ...`
            # link line fails with "cannot find -lm / -lc". Dynamic linking
            # against the manylinux baseline glibc (2.17) is the correct
            # manylinux-shaped choice anyway. Same sed pattern as the macOS
            # host build above.
            sed -i.bak 's/-static /-static-libgfortran -static-libgcc /' makefile.gf
            make -f makefile.gf FFLAGS='-O2 -fallow-argument-mismatch'
            mkdir -p {project}/src/tsecon/x13/_binary
            cp x13as_ascii {project}/src/tsecon/x13/_binary/x13as
            chmod +x {project}/src/tsecon/x13/_binary/x13as
            ls -la {project}/src/tsecon/x13/_binary
          # Test dependencies installed into the cibuildwheel test venv. numpy is
          # already a runtime dep of the wheel itself, so it's resolved automatically.
          # pytest-benchmark is required because pyproject's `addopts` includes
          # `--benchmark-skip`, which pytest rejects with exit code 4 ("command
          # line usage error") when the plugin isn't installed.
          CIBW_TEST_REQUIRES: "pytest>=8.0 hypothesis>=6.100 pytest-benchmark>=4.0"
          # Smoke test = (1) confirm the four Cython kernels are active in the
          # installed wheel, (2) confirm the X-13 binary is reachable and
          # produces a deseasonalised series for a minimal quarterly input,
          # (3) run the kernel-specific test files end-to-end.
          # `--benchmark-skip` honours pyproject's addopts default but is set
          # explicitly here so the test command is self-contained.
          CIBW_TEST_COMMAND: >
            python -c "import tsecon; assert tsecon.rec_linear_is_cython(), 'rec_linear kernel missing'; assert tsecon.lookup_is_cython(), 'lookup kernel missing'; assert tsecon.stats_is_cython(), 'stats kernel missing'; assert tsecon.fconvert_is_cython(), 'fconvert kernel missing'" &&
            python -c "from tsecon.x13._result import _resolve_binary; assert _resolve_binary() is not None, 'x13as binary missing from installed wheel'; print('x13as binary at', _resolve_binary())" &&
            pytest -x --benchmark-skip
            {project}/tests/test_recursive.py
            {project}/tests/test_indexing.py
            {project}/tests/test_stats_kernels.py
            {project}/tests/test_fconvert_kernels.py
            {project}/tests/x13/test_run.py

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.python }}
          path: ./wheelhouse/*.whl
          if-no-files-found: error
          retention-days: 14
