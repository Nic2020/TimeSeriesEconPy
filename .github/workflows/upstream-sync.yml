name: upstream-sync

# Weekly diff against the TimeSeriesEcon.jl commit pinned in
# src/tsecon/_mirror.py. Opens or updates a tracking issue when there are
# upstream commits we have not yet ported.

on:
  schedule:
    - cron: "0 12 * * 1"  # Mondays at 12:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.12
      - name: Run mirror-sync script
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: uv run python scripts/check_mirror.py
